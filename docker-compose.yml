services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linka_development
      POSTGRES_USER: linka
      POSTGRES_PASSWORD: linka_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linka -d linka_development"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  synapse:
    image: matrixdotorg/synapse:latest
    environment:
      SYNAPSE_SERVER_NAME: localhost
      SYNAPSE_REPORT_STATS: "no"
    ports:
      - "8008:8008"
    volumes:
      - synapse_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/_matrix/client/versions || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  control-plane:
    build:
      context: ./rails-api
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://linka:linka_dev_password@postgres:5432/linka_development
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: changeme_generate_a_real_secret_for_production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - control-plane
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  synapse_data:
